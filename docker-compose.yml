services:
  mongodb:
    image: mongo:7
    container_name: nutriflow_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: nutriflow
      MONGO_INITDB_ROOT_PASSWORD: nutriflow123
      MONGO_INITDB_DATABASE: nutriflow_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7
    container_name: nutriflow_redis
    ports:
      - "6379:6379"

volumes:
  mongodb_data: