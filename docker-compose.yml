services:
  postgres:
    image: postgres:16
    container_name: nutriflow_postgres
    environment:
      POSTGRES_USER: nutriflow
      POSTGRES_PASSWORD: nutriflow123
      POSTGRES_DB: nutriflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: nutriflow_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: